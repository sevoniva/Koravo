server:
  port: ${KORAVO_SERVER_PORT:8080}

koravo:
  version: 0.1.0-SNAPSHOT
  security:
    secret-key: ${KORAVO_SECRET_KEY:koravo-dev-secret-key-change-me}

spring:
  application:
    name: koravo-server
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:koravo}
    username: ${POSTGRES_USER:koravo}
    password: ${POSTGRES_PASSWORD:koravo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

flowable:
  database-schema-update: true
  async-executor-activate: false
  process:
    definition-cache-limit: 128

springdoc:
  swagger-ui:
    path: /swagger-ui.html
