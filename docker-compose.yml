services:
  postgres:
    image: postgres:16-alpine
    container_name: koravo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koravo}
      POSTGRES_USER: ${POSTGRES_USER:-koravo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koravo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koravo} -d ${POSTGRES_DB:-koravo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koravo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: koravo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-koravo}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-koravo123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  koravo-server:
    build:
      context: .
      dockerfile: deploy/docker/koravo-server.Dockerfile
    container_name: koravo-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-koravo}
      POSTGRES_USER: ${POSTGRES_USER:-koravo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koravo}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KORAVO_SERVER_PORT: 8080
    ports:
      - "${KORAVO_SERVER_PORT:-8080}:8080"

  koravo-ui:
    build:
      context: .
      dockerfile: deploy/docker/koravo-ui.Dockerfile
    container_name: koravo-ui
    depends_on:
      koravo-server:
        condition: service_started
    ports:
      - "${KORAVO_UI_PORT:-5173}:80"

volumes:
  postgres-data:
  minio-data:
